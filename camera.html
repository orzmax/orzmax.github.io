<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Analyze with camera: orz's facial proportion analysis</title>
  <link rel="stylesheet" href="style.css">
</head>
<body data-page="camera">
  <header class="header">
    <a href="index.html" class="header-back">← Back to home</a>
    <h1>Analyze with camera</h1>
    <div class="mode-toggle">
      <span class="mode-label" data-mode="frontal">Frontal</span>
      <label class="switch">
        <input type="checkbox" id="modeSwitch" aria-label="Toggle frontal or side view">
        <span class="slider"></span>
      </label>
      <span class="mode-label" data-mode="side">Side</span>
    </div>
  </header>

  <main class="app">
    <section class="camera-section">
      <div class="video-container" id="videoContainer">
        <div class="video-wrapper" id="videoWrapper">
          <video id="video" playsinline muted autoplay></video>
          <img id="frozenFrame" class="frozen-frame" alt="" aria-hidden="true" />
          <canvas id="overlay"></canvas>
          <div class="overlay-message" id="overlayMessage" aria-live="polite"></div>
        </div>
        <div class="controls-bar">
          <button type="button" class="ctrl-btn" id="mirrorBtn">Mirror Camera</button>
          <button type="button" class="ctrl-btn" id="fullscreenBtn" title="ESC to exit">Fullscreen</button>
          <button type="button" class="ctrl-btn retake-in-bar" id="retakeBtn">Retake</button>
        </div>
      </div>
      <div class="hint-block" id="hintBlock">
        <p class="hint hint-main" id="hint">Allow camera access to begin analysis.</p>
        <p class="hint hint-sub empty" id="hintSub">Use mirror / fullscreen below if needed.</p>
      </div>
    </section>

    <aside class="dashboard">
      <h2>Metrics</h2>
      <div id="metricsRoot"></div>
    </aside>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
  <script src="script.js"></script>
</body>
</html>
