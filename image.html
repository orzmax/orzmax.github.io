<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Analyze from image: orz's facial proportion analysis</title>
  <link rel="stylesheet" href="style.css">
</head>
<body data-page="image">
  <header class="header">
    <a href="index.html" class="header-back">← Back to home</a>
    <h1>Analyze from image</h1>
    <div class="mode-toggle">
      <span class="mode-label" data-mode="frontal">Frontal</span>
      <label class="switch">
        <input type="checkbox" id="modeSwitch" aria-label="Toggle frontal or side view">
        <span class="slider"></span>
      </label>
      <span class="mode-label" data-mode="side">Side</span>
    </div>
  </header>

  <main class="app">
    <section class="camera-section image-section">
      <div class="video-container" id="videoContainer">
        <div class="video-wrapper image-wrapper" id="videoWrapper">
          <div class="image-drop-zone" id="imageDropZone">
            <p class="image-drop-text">Paste (Ctrl+V) or choose an image below</p>
          </div>
          <img id="sourceImage" class="source-image" alt="" style="display: none;" />
          <canvas id="overlay"></canvas>
          <div class="overlay-message" id="overlayMessage" aria-live="polite"></div>
        </div>
        <div class="controls-bar">
          <input type="file" id="fileInput" accept="image/*" hidden>
          <button type="button" class="ctrl-btn" id="uploadBtn">Choose image</button>
          <button type="button" class="ctrl-btn" id="clearBtn">Clear</button>
        </div>
      </div>
      <div class="hint-block" id="hintBlock">
        <p class="hint hint-main" id="hint">Paste an image (Ctrl+V) or choose a file to analyze.</p>
        <p class="hint hint-sub empty" id="hintSub"></p>
      </div>
    </section>

    <aside class="dashboard">
      <h2>Metrics</h2>
      <div id="pslRoot" class="psl-container" aria-live="polite"></div>
      <div id="metricsRoot"></div>
    </aside>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
  <script src="script.js"></script>
</body>
</html>
